# Refer to `docker-compose.override.yaml.example’ for some sample configurations.

services:
  mongodb:
    container_name: chat-mongodb-standalone
    image: mongo
    restart: always
    user: "${UID}:${GID}"
    ports:
      - '27017:27017'
    networks:
      - mongo_default
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

networks:
  mongo_default:
    external: true